<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>تفاصيل المادة - VISION TV</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow-hidden;
      user-select: none;
    }

    /* الخلفية الضبابية الكبيرة */
    .hero-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100vh;
      background-size: cover;
      background-position: center;
      filter: blur(20px) brightness(0.3);
      z-index: -1;
    }

    .container {
      display: flex;
      padding: 50px;
      height: calc(100vh - 100px);
      gap: 50px;
      align-items: flex-start;
    }

    .poster-img {
      width: 300px;
      height: 450px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      border: 1px solid #333;
    }

    .info-side {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .title { font-size: 42px; font-weight: bold; margin-bottom: 10px; }
    .meta-info { font-size: 16px; color: #1f6feb; margin-bottom: 20px; font-weight: bold; }
    .description { font-size: 18px; color: #ccc; line-height: 1.6; margin-bottom: 30px; max-width: 800px; }

    /* الأزرار والمواسم */
    .actions { display: flex; gap: 20px; margin-bottom: 30px; }
    .btn {
      padding: 15px 35px; font-size: 18px; font-weight: bold;
      border: none; border-radius: 8px; cursor: pointer; color: white;
      background: #222; border: 1px solid #444; transition: transform 0.2s;
    }
    .btn.play { background: #1f6feb; border: none; }
    .btn.focused { outline: 4px solid #fff; transform: scale(1.05); }

    /* مخصص للمسلسلات: قائمة الحلقات والمواسم */
    .series-section { display: none; flex-direction: column; width: 100%; margin-top: 20px; }
    .list-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }
    .episode-card {
      background: #161616; border: 1px solid #222; padding: 15px;
      border-radius: 8px; min-width: 180px; text-align: center; font-size: 14px;
    }
    .episode-card.focused { outline: 3px solid #1f6feb; background: #222; }
  </style>
</head>
<body>

<div class="hero-bg" id="hero-backdrop"></div>

<div class="container">
  <img class="poster-img" id="item-poster" src="" onerror="this.src='https://placehold.co/300x450/1a1a1a/ffffff?text=No+Poster'" />

  <div class="info-side">
    <div class="title" id="item-title">اسم المادة</div>
    <div class="meta-info" id="item-meta">التصنيف: أفلام</div>
    <div class="description" id="item-desc">جاري تحميل تفاصيل القصة والوصف الخاص بالفيلم أو المسلسل...</div>

    <div class="actions">
      <button class="btn play details-focusable" id="btn-play" onclick="startPlayback()">▶ تشغيل</button>
      <button class="btn details-focusable" id="btn-fav" onclick="toggleFavorite()">❤️ إضافة للمفضلة</button>
      <button class="btn details-focusable" onclick="window.location.href='index.html'">🔙 عودة</button>
    </div>

    <div class="series-section" id="series-area">
      <h3 style="color: #1f6feb; margin-bottom: 5px;">الحلقات المتوفرة:</h3>
      <div class="list-container" id="episodes-list"></div>
    </div>
  </div>
</div>

<script src="js/details.js"></script>
</body>
</html>
