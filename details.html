<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>VISION TV - DETAILS</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { margin: 0; background: #0b0b0b; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; box-sizing: border-box; }
    .back-nav-btn { background: #161616; padding: 10px 20px; border-radius: 8px; border: 1px solid #222; color: #fff; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; font-weight: bold; margin-bottom: 30px; }
    .back-nav-btn.focused { outline: 3px solid #1f6feb; background: #1f6feb; }
    
    .series-details-header { display: flex; gap: 40px; margin-bottom: 40px; background: #111; padding: 30px; border-radius: 16px; border: 1px solid #1a1a1a; }
    .series-poster { width: 240px; height: 340px; object-fit: cover; border-radius: 12px; border: 2px solid #222; }
    .series-info-text { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .series-title { font-size: 32px; font-weight: bold; margin: 0 0 15px 0; color: #1f6feb; }
    .series-meta { display: flex; gap: 20px; color: #aaa; font-size: 15px; margin-bottom: 20px; }
    .series-plot { font-size: 16px; color: #ddd; line-height: 1.6; max-width: 800px; }

    /* قائمة الحلقات وسطر المتابعة */
    .episodes-section-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px; }
    .episodes-list-grid { display: flex; flex-direction: column; gap: 12px; }
    
    .episode-row-item {
      background: #161616; border: 1px solid #222; border-radius: 10px; padding: 16px 25px;
      display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s;
    }
    .episode-row-item.focused { outline: 3px solid #1f6feb; background: #1c2430; transform: scale(1.01); }
    .ep-left-side { display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: bold; }
    .ep-left-side .material-icons { color: #aaa; }
    
    /* علامة "آخر حلقة شوهدت" المضيئة */
    .watching-badge { background: rgba(31, 111, 235, 0.2); color: #1f6feb; border: 1px solid #1f6feb; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; display: none; }
    .episode-row-item.last-watched .watching-badge { display: inline-block; }
    .episode-row-item.last-watched .ep-left-side .material-icons { color: #1f6feb; }
  </style>
</head>
<body>

  <a href="index.html" class="back-nav-btn details-focusable" id="btn-back-home">
    <span class="material-icons">arrow_forward</span>
    <span>العودة للرئيسية</span>
  </a>

  <div class="series-details-header">
    <img id="series-img" class="series-poster" src="https://placehold.co/240x340/1a1a1a/ffffff?text=VISION" alt="Poster">
    <div class="series-info-text">
      <div class="series-title" id="series-title">اسم المسلسل</div>
      <div class="series-meta">
        <span id="series-year">السنة: --</span>
        <span>|</span>
        <span id="series-rating">التقييم: --</span>
        <span>|</span>
        <span style="color:#00C851;">المظهر: FHD Premium</span>
      </div>
      <div class="series-plot" id="series-plot">جاري تحميل تفاصيل وقصة المسلسل التفاعلي بالكامل...</div>
    </div>
  </div>

  <div class="episodes-section-title">
    <span class="material-icons" style="color:#1f6feb;">play_circle_filled</span>
    <span>حلقات المسلسل وقائمة المتابعة الحركية</span>
  </div>

  <div class="episodes-list-grid" id="episodes-container">
    </div>

<script>
  let seriesItem = JSON.parse(localStorage.getItem("current")) || {};
  let episodesList = [];
  let focusIdx = 0; // 0 للرجوع، 1+ للحلقات
  let totalItemsCount = 1;

  function loadEpisodes() {
    document.getElementById("series-title").innerText = seriesItem.name || "Unknown Series";
    if (seriesItem.stream_icon) document.getElementById("series-img").src = seriesItem.stream_icon;
    document.getElementById("series-year").innerText = `السنة: ${seriesItem.year || '2026'}`;
    document.getElementById("series-rating").innerText = `التقييم: ${seriesItem.rating || '⭐ 8.5'}`;
    
    // إنشاء حلقات افتراضية ذكية للمسلسل في حال عدم وجود سيرفر Xtream نشط بالكامل للتجربة المباشرة
    episodesList = [
      { id: "ep_1", title: "الحلقة الأولى - بداية الإثارة التشغيلية", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
      { id: "ep_2", title: "الحلقة الثانية - التعمق في هندسة الأكواد", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
      { id: "ep_3", title: "الحلقة الثالثة - الربط الشامل والسريع مع الريموت", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
      { id: "ep_4", title: "الحلقة الرابعة - مواصفات مشغل الـ OSD المثالي", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
    ];

    // تخزين حزمة الحلقات الحالية للوصول إليها داخل المشغل للتنقل التلقائي
    localStorage.setItem("episodes_pack", JSON.stringify(episodesList));

    // جلب معرف آخر حلقة تم مشاهدتها لهذا المسلسل لتفعيل ميزة المتابعة
    const lastWatchedEpId = localStorage.getItem(`last_ep_for_series_${seriesItem.series_id || 905}`);

    const container = document.getElementById("episodes-container");
    container.innerHTML = "";

    episodesList.forEach((ep, idx) => {
      const row = document.createElement("div");
      row.className = "episode-row-item details-focusable";
      
      // إذا كانت هذه الحلقة هي الأخيرة التي شوهدت، نمنحها كلاس العلامة المضيئة تلقائياً
      if (ep.id === lastWatchedEpId) {
        row.classList.add("last-watched");
      }

      row.innerHTML = `
        <div class="ep-left-side">
          <span class="material-icons">play_arrow</span>
          <span>${ep.title}</span>
        </div>
        <div class="watching-badge">آخر حلقة شوهدت مسبقاً ✨</div>
      `;

      row.onclick = () => launchEpisode(idx);
      container.appendChild(row);
    });

    totalItemsCount = 1 + episodesList.length;
    updateDetailsFocus();
  }

  function launchEpisode(idx) {
    const ep = episodesList[idx];
    // حفظ معرف الحلقة لتنير المرة القادمة
    localStorage.setItem(`last_ep_for_series_${seriesItem.series_id || 905}`, ep.id);
    localStorage.setItem("current_ep_index", idx);
    
    // إنشاء سياق التنقل بين الحلقات داخل المشغل (أزرار التالي والسابق تحت بار التحكم)
    let playerContext = episodesList.map(e => ({
      name: e.title,
      url: e.url,
      id: e.id,
      type: "series_episode"
    }));
    
    localStorage.setItem("current_playlist_context", JSON.stringify(playerContext));
    localStorage.setItem("current_playlist_index", idx);
    localStorage.setItem("current", JSON.stringify(playerContext[idx]));

    window.location.href = "player.html";
  }

  function updateDetailsFocus() {
    document.querySelectorAll(".details-focusable").forEach((el, i) => {
      el.classList.toggle("focused", i === focusIdx);
    });
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowDown") {
      if (focusIdx < totalItemsCount - 1) { focusIdx++; updateDetailsFocus(); }
    }
    if (e.key === "ArrowUp") {
      if (focusIdx > 0) { focusIdx--; updateDetailsFocus(); }
    }
    if (e.key === "Enter") {
      if (focusIdx === 0) {
        document.getElementById("btn-back-home").click();
      } else {
        launchEpisode(focusIdx - 1);
      }
    }
    if (e.key === "Backspace" || e.key === "Escape") {
      window.location.href = "index.html";
    }
  });

  window.onload = loadEpisodes;
</script>
</body>
</html>
