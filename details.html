<!DOCTYPE html>
<html lang="ar" dir="rtl" id="details-html-tag">
<head>
  <meta charset="utf-8">
  <title>VISION TV - SERIES DETAILS</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { margin: 0; background: #0b0b0b; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; }
    .action-row-container { display: flex; gap: 15px; margin-bottom: 30px; }
    .btn-action { background: #161616; padding: 12px 24px; border-radius: 8px; border: 1px solid #333; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; text-decoration: none; }
    .btn-action.focused, .btn-action:hover { outline: 3px solid #1f6feb; background: #1f6feb; }
    
    .series-header { display: flex; gap: 40px; background: #111; padding: 30px; border-radius: 16px; border: 1px solid #222; margin-bottom: 30px; }
    .series-poster { width: 220px; height: 300px; object-fit: cover; border-radius: 12px; }
    
    .episodes-grid-youtube { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .episode-yt-card { background: #161616; border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: transform 0.2s; position: relative; }
    .episode-yt-card.focused { outline: 3px solid #1f6feb; transform: scale(1.02); }
    .thumb-wrapper { position: relative; width: 100%; height: 160px; background: #222; }
    .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    
    .yt-progress-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: rgba(255,255,255,0.3); }
    .yt-progress-fill { height: 100%; background: #ff0000; width: 0%; box-shadow: 0 0 4px #ff0000; }
    
    .ep-card-info { padding: 12px; }
    .ep-card-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; }
    .ep-card-status { font-size: 12px; color: #1f6feb; font-weight: bold; }
  </style>
</head>
<body>

  <div class="action-row-container">
    <a href="index.html" class="btn-action details-focusable"><span class="material-icons">arrow_forward</span><span id="lbl-back">العودة للرئيسية</span></a>
    <button class="btn-action details-focusable" style="background:#00c851;" onclick="resumeLastWatchedEpisode()"><span class="material-icons">play_circle_filled</span><span id="lbl-resume-btn">متابعة المشاهدة (Resume)</span></button>
  </div>

  <div class="series-header">
    <img id="series-img" class="series-poster" src="https://placehold.co/220x300/ff4444/ffffff?text=Series" />
    <div>
      <h1 id="series-title" style="margin:0 0 15px 0;">اسم المسلسل</h1>
      <p style="color:#aaa;" id="series-desc">تفاصيل وقصة المسلسل كاملة لعرض تجربة البث المحدثة وبدقة عالية الجودة.</p>
    </div>
  </div>

  <h3 style="margin-bottom:20px;" id="lbl-episodes-heading">حلقات المسلسل</h3>
  <div class="episodes-grid-youtube" id="episodes-container"></div>

<script src="js/details.js"></script>
</body>
</html>
