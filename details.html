<!DOCTYPE html>
<html lang="ar" dir="rtl" id="details-html">
<head>
  <meta charset="utf-8">
  <title>VISION TV - VERTICAL DETAILS</title>
  <style>
    body { background: #000; color: #fff; padding: 3rem; font-family: sans-serif; }
    .btn-action { background: #141414; padding: 1rem 2rem; border-radius: 12px; border: 1px solid #333; color: #fff; text-decoration: none; font-weight: bold; cursor: pointer; }
    .episode-row-card { display: flex; background: #141414; border-radius: 16px; padding: 1rem; gap: 2rem; margin-bottom: 1.5rem; cursor: pointer; border: 1px solid #222; }
    .thumb-area { position: relative; width: 18rem; height: 10rem; border-radius: 10px; overflow: hidden; }
    .thumb-area img { width: 100%; height: 100%; object-fit: cover; }
    .yt-progress-bar { position: absolute; bottom: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.2); }
    .yt-progress-fill { height: 100%; background: #e50914; width: 0%; }
  </style>
</head>

</html>
