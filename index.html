<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sciensta IPTV Custom OS</title>
    <link rel="stylesheet" href="assets/home.css">
</head>
<body>
    <div id="home">
        <header id="home-header">
            <div id="home-date">الجمعة، ٣ يوليو ٢٠٢٦</div>
            <div id="home-clock">12:00:00 PM</div>
            <div id="brand-lang">
                <span>Sciensta IPTV</span>
                <button id="lang-btn" onclick="toggleLanguage()">العربية / EN</button>
            </div>
        </header>

        <section id="hero-banner">
            <div class="banner-content">
                <h2>أكمل المشاهدة</h2>
                <p>فيلم جبال الصمت</p>
                <button id="resume-btn">▶ اكمل الآن</button>
            </div>
        </section>

        <main id="home-grid">
            <div class="tile" id="tile-livetv">📺 البث المباشر</div>
            <div class="tile" id="tile-series">🎬 المسلسلات</div>
            <div class="tile" id="tile-movies">🎥 الأفلام</div>
            <div class="tile-col">
                <div id="tile-favs">⭐ المفضلة</div>
                <div id="tile-search">🔍 البحث</div>
                <div id="tile-settings">⚙️ الإعدادات</div>
            </div>
        </main>

        <footer id="speed-container">🌐 <span id="internet-speed">--</span></footer>
    </div>
    <script src="dist/js/home.js"></script>
</body>
</html>
