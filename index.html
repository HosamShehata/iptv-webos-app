<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IPTV Pro</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 12px;
      background: #000;
    }

    input {
      width: 98%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 180px;
      background: #1a1a1a;
      overflow-y: auto;
    }

    .category {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .category:hover {
      background: #0d6efd;
    }

    .content {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .channel {
      padding: 12px;
      margin: 6px 0;
      background: #222;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
    }

    .channel:hover {
      background: #0d6efd;
    }

    .star {
      color: gold;
      cursor: pointer;
    }

    .epg-box {
      margin-top: 10px;
      padding: 10px;
      background: #000;
    }

    .epg-item {
      padding: 6px;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }

    .section-title {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search channels..." oninput="renderChannels()" />
</header>

<div class="layout">

  <div class="sidebar" id="categories"></div>

  <div class="content">

    <div class="section-title">📺 Channels</div>
    <div id="channels"></div>

    <div class="section-title">⭐ Favorites</div>
    <div id="favorites"></div>

    <div class="epg-box">
      <h3>📺 EPG</h3>
      <div id="epg"></div>
    </div>

  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
