<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Sciensta IPTV - Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" style="max-width: 500px; margin: 20px auto; padding: 20px; background: #141416; color: #fff; border-radius: 8px;">
        <h2>إدخال بيانات البلايليست</h2>
        <input type="text" id="prof-name" placeholder="اسم البروفايل أو السيرفر" style="width:100%; padding:8px; margin:5px 0;" /><br>
        <input type="text" id="prof-username" placeholder="Username" style="width:100%; padding:8px; margin:5px 0;" /><br>
        <input type="password" id="prof-password" placeholder="Password" style="width:100%; padding:8px; margin:5px 0;" /><br>
        <input type="text" id="server-url" placeholder="Host URL (e.g., http://domain.com:8080)" style="width:100%; padding:8px; margin:5px 0;" /><br>
        <button id="save-profile-btn" style="width:100%; padding:10px; background:#ffaa00; font-weight:bold; margin-top:10px;">حفظ وتشغيل</button>
    </div>

    <div id="status" style="max-width: 500px; margin: 10px auto; color: yellow; background: #222; padding: 10px;">الحالة: في انتظار البيانات...</div>

    <div style="max-width: 500px; margin: 10px auto; color: #fff;">
        <h3>القنوات المستدعاة بنجاح:</h3>
        <ul id="channels-list" style="max-height: 200px; overflow-y: auto;"></ul>
    </div>

    <script src="api.js"></script>
    <script src="remote.js"></script>
    <script src="app.js"></script>
</body>
</html>
