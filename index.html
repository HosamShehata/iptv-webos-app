<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sciensta IPTV - Playlist Test</title>
    <style>
        body {
            background-color: #0c0c0e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: #141416;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ffaa00;
        }
        .field-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #b1b1b3;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2a2a2e;
            background: #222224;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #ffaa00;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ffaa00;
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background: #e69d00;
        }
        #status {
            margin: 20px 0;
            padding: 12px;
            background: #1d1d21;
            border-right: 4px solid #ffaa00;
            color: #ffaa00;
            font-size: 14px;
            border-radius: 4px;
            text-align: center;
        }
        .channels-section {
            margin-top: 25px;
        }
        h3 {
            color: #ffaa00;
            border-bottom: 1px solid #2a2a2e;
            padding-bottom: 8px;
            font-size: 16px;
        }
        ul {
            list-style: none;
            padding: 0;
            max-height: 250px;
            overflow-y: auto;
            background: #1d1d21;
            border-radius: 6px;
        }
        li {
            padding: 12px;
            border-bottom: 1px solid #2a2a2e;
            font-size: 15px;
            color: #e2e2e4;
        }
        li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>إدخال بيانات البلايليست</h2>
    
    <div class="field-group">
        <label for="prof-name">اسم البروفايل (Any Name)</label>
        <input type="text" id="prof-name" placeholder="e.g. My IPTV Service" autocomplete="off" />
    </div>

    <div class="field-group">
        <label for="prof-username">اسم المستخدم (Username)</label>
        <input type="text" id="prof-username" placeholder="Username" autocomplete="off" />
    </div>

    <div class="field-group">
        <label for="prof-password">كلمة المرور (Password)</label>
        <input type="password" id="prof-password" placeholder="Password" autocomplete="off" />
    </div>

    <div class="field-group">
        <label for="server-url">رابط السيرفر (Server URL)</label>
        <input type="text" id="server-url" placeholder="http://example.com:8080" autocomplete="off" />
    </div>
    
    <button id="save-profile-btn">حفظ وتشغيل</button>

    <div id="status">الحالة: في انتظار البيانات...</div>

    <div class="channels-section">
        <h3>القنوات المستدقة من السيرفر:</h3>
        <ul id="channels-list">
            <li style="color: #666; text-align: center;">لم يتم تحميل أي قنوات بعد.</li>
        </ul>
    </div>
</div>

<script src="api.js"></script>
<script src="remote.js"></script>
<script src="app.js"></script>

</body>
</html>
