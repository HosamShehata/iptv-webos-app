<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sciensta IPTV</title>
    <meta name="theme-color" content="#0c0c0e" />
    <link rel="stylesheet" href="assets/base.css" />
    <link rel="stylesheet" href="assets/home.css" />
</head>
<body>
    <div id="home">
        <!-- الهيدر العلوي المطور للتطبيق -->
        <header class="app-header" id="home-header">
            <!-- الجهة اليمنى: التاريخ واليوم -->
            <div class="header-date" id="current-date">جاري تحميل التاريخ...</div>

            <!-- المنتصف: الساعة الرقمية العصرية وجنبها حلقة اللودنج الحديثة -->
            <div style="display: flex; align-items: center; justify-content: center; gap: 1.5vw;">
                <div class="header-clock" id="current-time">00:00:00 PM</div>
                <div class="loading-spinner" id="main-loader"></div>
            </div>

            <!-- الجهة اليسرى: اللوجو بالإنجليزية وزر تغيير اللغة السريع -->
            <div class="header-branding" id="home-brand">
                <div class="app-logo">Sciensta <span>IPTV</span></div>
                <button class="lang-toggle-btn" onclick="toggleLanguage()" id="lang-btn" tabindex="-1">English</button>
            </div>
        </header>

        <!-- البانر السينمائي العريض (متابعة المشاهدة) -->
        <section class="cinematic-banner" id="hero-banner">
            <div class="banner-content">
                <h2 id="banner-title">أكمل المشاهدة</h2>
                <p id="banner-sub">اضغط للاستمرار من حيث توقفت في العرض الأخير</p>
                <button class="play-btn" onclick="resumeLastWatched()" id="btn-resume" tabindex="-1">▶ أكمل الآن</button>
            </div>
        </section>

        <!-- القائمة الرئيسية الأفقية المطورة للأقسام -->
        <nav class="main-navbar" id="home-grid">
            <div class="nav-item active tile-livetv" id="tile-livetv" data-target="live" tabindex="-1">
                <span class="icon">📺</span> البث المباشر
            </div>
            <div class="nav-item tile-series" id="tile-series" data-target="series" tabindex="-1">
                <span class="icon">🎬</span> المسلسلات
            </div>
            <div class="nav-item tile-movies" id="tile-movies" data-target="movies" tabindex="-1">
                <span class="icon">🎥</span> الأفلام
            </div>
            <div class="nav-item tile-favs" id="tile-favs" data-target="favs" tabindex="-1">
                <span class="icon">⭐</span> المفضلة
            </div>
            <div class="nav-item tile-continue" id="tile-continue" data-target="continue" tabindex="-1">
                <span class="icon">⏱️</span> متابعة المشاهدة
            </div>
            <div class="nav-item tile-search" id="tile-search" data-target="search" tabindex="-1">
                <span class="icon">🔍</span> البحث المتقدم
            </div>
            <div class="nav-item tile-settings" id="tile-settings" data-target="settings" tabindex="-1">
                <span class="icon">⚙️</span> الإعدادات
            </div>
        </nav>

        <!-- الفوتر السفلي (أداة قياس سرعة الإنترنت الذكية والخفية) -->
        <footer class="app-footer">
            <div class="speedtest-container" onclick="toggleSpeedTest()" id="speed-container" tabindex="-1">
                <span class="wifi-icon" id="wifi-status">🌐</span>
                <span class="speed-value" id="internet-speed">--</span>
                <span class="speed-unit" id="speed-unit">Mbps</span>
            </div>
        </footer>
    </div>

    <!-- ملفات النظام البرمجية الأصلية المحفوظة -->
    <script src="dist/js/polyfills.js"></script>
    <script src="dist/js/iptv-core.js"></script>
    <script src="dist/js/home.js"></script>
    <script defer src="dist/js/prewarm.js"></script>
</body>
</html>
