<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IPTV Pro</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 10px;
      background: #000;
    }

    input {
      width: 98%;
      padding: 12px;
      border: none;
      border-radius: 6px;
    }

    .layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 180px;
      background: #111;
      overflow-y: auto;
    }

    .category {
      padding: 14px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .category:hover {
      background: #1f6feb;
    }

    .content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      text-align: center;
    }

    .card:hover {
      background: #1f6feb;
      transform: scale(1.05);
    }

    .fav {
      position: absolute;
      top: 6px;
      right: 10px;
      color: gold;
      font-size: 18px;
      cursor: pointer;
    }

    .section-title {
      margin: 10px 0;
      color: #aaa;
    }

    .epg-box {
      margin-top: 15px;
      padding: 10px;
      background: #111;
      border-radius: 8px;
    }

    .epg-item {
      padding: 6px;
      border-bottom: 1px solid #222;
      font-size: 13px;
    }
  </style>

</head>

<body>

<header>
  <input id="search" placeholder="Search channels..." oninput="renderChannels()" />
</header>

<div class="layout">

  <div class="sidebar" id="categories"></div>

  <div class="content">

    <div class="section-title">📺 Channels</div>
    <div id="channels" class="grid"></div>

    <div class="section-title">⭐ Favorites</div>
    <div id="favorites" class="grid"></div>

    <div class="epg-box">
      <div class="section-title">📺 EPG</div>
      <div id="epg"></div>
    </div>

  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
