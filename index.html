<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IPTV Pro</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 15px;
      background: #000;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 200px;
      background: #1a1a1a;
      height: 100vh;
      padding: 10px;
    }

    .channel {
      padding: 12px;
      margin: 5px 0;
      background: #222;
      cursor: pointer;
    }

    .channel:hover {
      background: #0d6efd;
    }

    .content {
      flex: 1;
      padding: 10px;
    }

    .category {
      padding: 10px;
      margin-bottom: 5px;
      background: #333;
      cursor: pointer;
    }

  </style>

</head>

<body>

<header>
  <input id="search" placeholder="Search channels..." oninput="renderChannels()" />
</header>

<div class="container">

  <div class="sidebar" id="categories"></div>

  <div class="content">
    <div id="channels"></div>
  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
