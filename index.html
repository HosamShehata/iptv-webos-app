<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>Sciensta IPTV</title>
    <link rel="stylesheet" href="assets/home.css" />
</head>
<body>
    <div id="home">
        <header id="home-header">
            <div id="brand-lang">
                <div id="home-brand">Sciensta <span>IPTV</span></div>
                <button id="lang-btn" onclick="toggleLanguage()">English</button>
            </div>
            <div id="home-clock">00:00 AM</div>
            <div id="home-date">--</div>
        </header>

        <main id="home-grid">
            <div class="home-tile-main" id="tile-livetv" tabindex="0">📺 البث المباشر</div>
            <div class="home-tile-main" id="tile-series" tabindex="0">📺 المسلسلات</div>
            <div class="home-tile-main" id="tile-movies" tabindex="0">🎬 الأفلام</div>
            <div class="home-tile-main" id="tile-favs" tabindex="0">⭐ المفضلة</div>
        </main>
    </div>
    <script src="dist/js/home.js"></script>
</body>
</html>
