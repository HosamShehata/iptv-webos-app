<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IPTV TV Mode</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    header {
      padding: 10px;
      background: #000;
    }

    input {
      width: 98%;
      padding: 12px;
      border: none;
      border-radius: 6px;
    }

    .layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 200px;
      background: #111;
      overflow-y: auto;
    }

    .category {
      padding: 15px;
      border-bottom: 1px solid #222;
    }

    .category.focused {
      background: #1f6feb;
    }

    .content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card.focused {
      outline: 3px solid #1f6feb;
      transform: scale(1.05);
    }
  </style>

</head>

<body>

<header>
  <input id="search" placeholder="Search..." oninput="renderChannels()" />
</header>

<div class="layout">

  <div class="sidebar" id="categories"></div>

  <div class="content">
    <div id="channels" class="grid"></div>
  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
