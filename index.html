<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sciensta IPTV Custom OS</title>
    <link rel="stylesheet" href="assets/home.css">
</head>
<body>
    <div id="home">
        <header id="home-header">
            <div id="home-date">--</div>
            <div id="home-clock">--:-- --</div>
            <div id="brand-lang">
                <div id="home-brand">Sciensta IPTV</div>
                <button id="lang-btn" onclick="toggleLanguage()">العربية / EN</button>
            </div>
        </header>

        <section id="hero-banner">
            <div class="banner-content">
                <h2>أكمل المشاهدة</h2>
                <p>فيلم جبال الصمت</p>
                <button id="resume-btn">▶ اكمل الآن</button>
            </div>
        </section>

        <main id="home-grid">
            <div class="tile" id="tile-livetv" tabindex="0">📺 البث المباشر</div>
            <div class="tile" id="tile-series" tabindex="0">🎬 المسلسلات</div>
            <div class="tile" id="tile-movies" tabindex="0">🎥 الأفلام</div>
            <div class="tile" id="tile-favs" tabindex="0">⭐ المفضلة</div>
            <div class="tile" id="tile-search" tabindex="0">🔍 البحث</div>
            <div class="tile" id="tile-settings" tabindex="0">⚙️ الإعدادات</div>
        </main>

        <footer id="speed-container">🌐 <span id="internet-speed">--</span></footer>
    </div>
    <script src="dist/js/home.js"></script>
</body>
</html>
