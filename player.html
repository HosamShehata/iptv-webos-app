<!DOCTYPE html>
<html lang="ar" dir="rtl" id="player-html-tag">
<head>
  <meta charset="utf-8">
  <title>VISION TV - PREMIUM PLAYER</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family:sans-serif; }
    .video-container { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    video { width:100%; height:100%; object-fit:contain; }
    
    .osd-controls-panel {
      position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0));
      padding:40px; box-sizing:border-box; display:flex; flex-direction:column; gap:20px; transition:opacity 0.3s;
    }
    .timeline-container { display:flex; align-items:center; gap:15px; width:100%; }
    
    .progress-bar-clickable-zone { flex:1; height:14px; display:flex; align-items:center; cursor:pointer; position:relative; }
    .progress-bg { width:100%; height:6px; background:rgba(255,255,255,0.2); border-radius:3px; position:relative; width:100%; }
    .progress-fill { height:100%; width:0%; background:#ff0000; border-radius:3px; position:relative; }
    
    /* المقبض الممسوك بلون متباين للتقديم باللمس */
    .progress-knob {
      position:absolute; top:50%; transform:translate(-50%, -50%); width:16px; height:16px;
      background:#ffffff; border:3px solid #ff0000; border-radius:50%; box-shadow:0 0 8px rgba(0,0,0,0.8);
    }

    .controls-row-buttons { display:flex; align-items:center; justify-content:center; gap:30px; width:100%; }
    .control-btn { background:none; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; width:45px; height:45px; border-radius:50%; }
    .control-btn .material-icons { font-size:30px; }
    .control-btn:hover { background:rgba(255,255,255,0.1); }
    
    .speed-badge-selector { background:rgba(255,255,255,0.1); border:1px solid #444; color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold; }
  </style>
</head>
<body>

<div class="video-container" onmousemove="showOSD()">
  <video id="video" autoplay></video>
  
  <div class="osd-controls-panel" id="controls-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div id="player-title" style="font-size:20px; font-weight:bold; color:#fff;">Episode Title</div>
      <button class="speed-badge-selector" onclick="changePlaybackSpeed()" id="speed-label-btn">1.0x</button>
    </div>
    
    <div class="timeline-container">
      <div id="current-time" style="color:#aaa; font-family:monospace;">00:00:00</div>
      <div class="progress-bar-clickable-zone" id="timeline-click-zone">
        <div class="progress-bg">
          <div class="progress-fill" id="fill-bar"></div>
          <div class="progress-knob" id="progress-knob" style="left:0%;"></div>
        </div>
      </div>
      <div id="total-time" style="color:#aaa; font-family:monospace;">00:00:00</div>
    </div>

    <div class="controls-row-buttons">
      <button class="control-btn" id="btn-rewind-action"><span class="material-icons">replay_10</span></button>
      <button class="control-btn" onclick="togglePlayPause()"><span class="material-icons" id="icon-play">pause</span></button>
      <button class="control-btn" id="btn-forward-action"><span class="material-icons">forward_10</span></button>
    </div>
  </div>
</div>

<script src="js/player.js"></script>
</body>
</html>
