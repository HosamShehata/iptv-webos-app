<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Player</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
    }

    video {
      width: 100%;
      height: 100vh;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 18px;
      display: none;
    }

    #error {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: red;
    }
  </style>

</head>

<body>

<div id="loading">Loading stream...</div>
<div id="error"></div>

<video id="video" autoplay controls></video>

<script src="js/player.js"></script>

</body>
</html>
