<!DOCTYPE html>
<html lang="ar" dir="rtl" id="player-html" class="theme-netflix">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISION TV - CINEMATIC VIDEO ENGINE</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
  <style>
    .theme-netflix { --accent: #e50914; }
    body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family:sans-serif; }
    .video-container { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    video { width:100%; height:100%; object-fit:contain; }
    .osd-controls-panel { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0)); padding:3.5rem; display:flex; flex-direction:column; gap:1.5rem; transition:opacity 0.4s ease; opacity:1; }
    .timeline-container { display:flex; align-items:center; gap:1.5rem; width:100%; }
    .time-txt { color:#ccc; font-family:monospace; font-size:1.15rem; }
    .progress-bar-clickable-zone { flex:1; height:1.6rem; display:flex; align-items:center; cursor:pointer; position:relative; }
    .progress-bg { width:100%; height:0.6rem; background:rgba(255,255,255,0.25); border-radius:4px; position:relative; }
    .progress-fill { height:100%; width:0%; background:var(--accent); border-radius:4px; }
    .progress-knob { position:absolute; top:50%; transform:translate(-50%, -50%); width:1.5rem; height:1.5rem; background:#fff; border:4px solid var(--accent); border-radius:50%; }
    .controls-row-buttons { display:flex; align-items:center; justify-content:center; gap:2.5rem; width:100%; }
    .control-btn { background:none; border:none; color:#fff; cursor:pointer; }
    .control-btn .material-icons { font-size:2.6rem; }
    .next-episode-popup-card { position: absolute; bottom: 12rem; left: 3.5rem; background: rgba(15,15,15,0.95); border: 2px solid var(--accent); padding: 1.5rem; border-radius: 14px; display: none; z-index: 99; }
  </style>
</head>
<body>

<div class="video-container">
  <video id="video" autoplay></video>
  <div class="next-episode-popup-card" id="next-ep-popup">
    <div style="color:var(--accent); font-weight:bold;">التالي تلقائياً خلال دقيقة ⏭️</div>
    <div id="next-ep-name-lbl" style="color:#fff; font-size:1.2rem;">الحلقة التالية من السيرفر</div>
  </div>
  <div class="osd-controls-panel" id="controls-panel">
    <div id="player-title" style="font-size:1.7rem; font-weight:bold; color:#fff;">جاري تحميل البث...</div>
    <div class="timeline-container">
      <div id="current-time" class="time-txt">00:00:00</div>
      <div class="progress-bar-clickable-zone" id="timeline-click-zone"><div class="progress-bg"><div class="progress-fill" id="fill-bar"></div><div class="progress-knob" id="progress-knob" style="left:0%;"></div></div></div>
      <div id="total-time" class="time-txt">00:00:00</div>
    </div>
    <div class="controls-row-buttons">
      <button class="control-btn" onclick="video.currentTime -= 10"><span class="material-icons">replay_10</span></button>
      <button class="control-btn" onclick="togglePlay()"><span class="material-icons" id="icon-play">pause</span></button>
      <button class="control-btn" onclick="video.currentTime += 10"><span class="material-icons">forward_10</span></button>
    </div>
  </div>
</div>

<script src="js/player.js"></script>
</body>
</html>
