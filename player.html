<!DOCTYPE html>
<html lang="ar" dir="rtl" id="player-html">
<head>
  <meta charset="utf-8">
  <title>VISION PLAYER - ADVANCED OSD</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
    .video-container { position:relative; width:100%; height:100%; }
    video { width:100%; height:100%; }
    .osd-panel { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent, rgba(0,0,0,0.9)); padding:3rem; }
    .slider-zone { width:100%; height:0.6rem; background:rgba(255,255,255,0.2); position:relative; cursor:pointer; border-radius:4px; }
    .slider-fill { height:100%; width:0%; background:#e50914; border-radius:4px; }
    .slider-knob { position:absolute; top:50%; transform:translate(-50%, -50%); width:1.4rem; height:1.4rem; background:#fff; border-radius:50%; }
    .controls-row { display:flex; justify-content:center; gap:2.5rem; margin-top:2rem; }
    .ctrl-btn { background:none; border:none; color:#fff; cursor:pointer; }
    .ctrl-btn .material-icons { font-size:2.5rem; }
    .badge-selector { background:rgba(0,0,0,0.6); border:1px solid #444; color:#fff; padding:0.5rem 1rem; border-radius:8px; cursor:pointer; font-size:1.1rem; }
  </style>
</head>
<body>

<div class="video-container">
  <video id="video" autoplay></video>
  <div class="osd-panel">
    <div class="slider-zone" id="timeline"><div class="slider-fill" id="fill-bar"></div><div class="slider-knob" id="progress-knob"></div></div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="video.currentTime -= seekDuration"><span class="material-icons">replay_10</span></button>
      <button class="ctrl-btn" onclick="togglePlay()"><span class="material-icons" id="icon-play">pause</span></button>
      <button class="ctrl-btn" onclick="video.currentTime += seekDuration"><span class="material-icons">forward_10</span></button>
      
      <!-- الأزرار المدمجة لتبديل لغة الترجمة والصوت الفوري في المشغل -->
      <button class="badge-selector" onclick="cycleAudioLanguage()" id="audio-btn">صوت: عربي</button>
      <button class="badge-selector" onclick="cycleSubtitlesLanguage()" id="sub-btn">الترجمة: إيقاف</button>
      <button class="badge-selector" onclick="changeOSDSeekDuration()">مدة القفز: <span id="osd-seek-lbl">10s</span></button>
    </div>
  </div>
</div>

<script src="js/player.js"></script>
</body>
</html>
